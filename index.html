<!DOCTYPE html>
<html lang="th" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบช่วยจัดทำเอกสาร ทอสต.6</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script src="./database_test.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .calendar-day {
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            border: 1px solid #4b5563;
            background-color: #374151;
            transition: all 0.2s;
        }

        .calendar-day:hover:not(.empty) {
            background-color: #4b5563;
            border-color: #9ca3af;
        }

        .calendar-day.selected {
            background-color: #2563eb;
            color: white;
            border-color: #3b82f6;
            font-weight: bold;
        }

        .calendar-day.empty {
            border: none;
            background: transparent;
            cursor: default;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #4b5563;
            padding: 0.75rem;
        }

        th {
            background-color: #1f2937;
            color: #9ca3af;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-white **mb-2**">ระบบช่วยกรอกข้อมูล ทอสต.6</h1>
            <p class="text-gray-400">สร้างชุดข้อมูลวันปฏิบัติงานและรายชื่อทนาย สำหรับนำไปวางในแบบฟอร์ม</p>
        </header>

        <div id="calendarSection" class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg mb-8">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <span>ขั้นตอนที่ 1: เลือกวันปฏิบัติงาน</span>
                <span class="text-sm font-normal text-gray-400">(เลือกเดือนและวันที่ต้องการ)</span>
            </h2>

            <div class="flex flex-wrap gap-4 mb-6 items-end">
                <div class="w-48">
                    <label class="block text-xs text-gray-500 mb-1">เดือน</label>
                    <select id="monthSelect"
                        class="w-full bg-gray-900 border border-gray-600 text-white rounded-lg p-2.5 focus:ring-blue-500 outline-none">
                        <option value="0">มกราคม</option>
                        <option value="1">กุมภาพันธ์</option>
                        <option value="2">มีนาคม</option>
                        <option value="3">เมษายน</option>
                        <option value="4">พฤษภาคม</option>
                        <option value="5">มิถุนายน</option>
                        <option value="6">กรกฎาคม</option>
                        <option value="7">สิงหาคม</option>
                        <option value="8">กันยายน</option>
                        <option value="9">ตุลาคม</option>
                        <option value="10">พฤศจิกายน</option>
                        <option value="11">ธันวาคม</option>
                    </select>
                </div>
                <div class="w-32">
                    <label class="block text-xs text-gray-500 mb-1">ปี พ.ศ.</label>
                    <input type="number" id="yearSelect" value="2568"
                        class="w-full bg-gray-900 border border-gray-600 text-white rounded-lg p-2.5 focus:ring-blue-500 outline-none">
                </div>

                <button id="selectAllBtn"
                    class="px-4 py-2.5 bg-gray-700 hover:bg-gray-600 text-white font-medium rounded-lg transition-colors border border-gray-500">
                    เลือกวันทั้งหมด (ทั้งเดือน)
                </button>
            </div>

            <div class="calendar-grid mb-2 text-xs font-bold text-gray-500 uppercase tracking-widest text-center">
                <div>อา</div>
                <div>จ</div>
                <div>อ</div>
                <div>พ</div>
                <div>พฤ</div>
                <div>ศ</div>
                <div>ส</div>
            </div>
            <div id="calendarDays" class="calendar-grid mb-6"></div>

            <div class="flex justify-between items-center bg-gray-900 p-4 rounded-lg">
                <span id="selectedCount" class="text-blue-400 font-medium">ยังไม่ได้เลือกวัน</span>
                <button id="applyCalendarBtn"
                    class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors shadow-lg">
                    สร้างตารางลงชื่อ ⬇️
                </button>
            </div>
        </div>

        <div id="tableWrapper" class="hidden bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                <div>
                    <h2 class="text-xl font-semibold text-white">ขั้นตอนที่ 2: ระบุรายชื่อทนาย</h2>
                    <p class="text-sm text-gray-400">พิมพ์ชื่อเพื่อค้นหาจากฐานข้อมูล</p>
                </div>
                <div class="flex gap-2">
                    <button id="clearAllBtn"
                        class="px-4 py-2 bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white border border-red-600/30 rounded-lg text-sm transition-all">
                        ล้างรายชื่อทั้งหมด 🗑️
                    </button>
                    <button id="exportBtn"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow-lg transition-all">
                        Export เป็นไฟล์ Excel 💾
                    </button>
                </div>
            </div>

            <div id="tableContainer" class="overflow-x-auto rounded-lg border border-gray-700"></div>
        </div>
    </div>

    <datalist id="lawyerSuggestions"></datalist>

    <script>
        const tableContainer = document.getElementById('tableContainer');
        const tableWrapper = document.getElementById('tableWrapper');
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const calendarDays = document.getElementById('calendarDays');
        const applyCalendarBtn = document.getElementById('applyCalendarBtn');
        const selectedCountText = document.getElementById('selectedCount');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const exportBtn = document.getElementById('exportBtn');

        const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

        let selectedDates = new Set();

        // โหลดปฏิทินตั้งแต่เริ่มเปิดหน้าเว็บ
        renderCalendar();

        function renderCalendar() {
            calendarDays.innerHTML = '';
            const month = parseInt(monthSelect.value);
            const yearBE = parseInt(yearSelect.value);
            const yearCE = yearBE - 543;

            const daysInMonth = new Date(yearCE, month + 1, 0).getDate();
            const firstDay = new Date(yearCE, month, 1).getDay();

            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day empty';
                calendarDays.appendChild(div);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const div = document.createElement('div');
                div.className = `calendar-day ${selectedDates.has(day) ? 'selected' : ''}`;
                div.textContent = day;
                div.onclick = () => {
                    if (selectedDates.has(day)) selectedDates.delete(day);
                    else selectedDates.add(day);
                    renderCalendar();
                    selectedCountText.textContent = `เลือกแล้ว ${selectedDates.size} วัน`;
                };
                calendarDays.appendChild(div);
            }
        }

        monthSelect.onchange = () => { selectedDates.clear(); renderCalendar(); selectedCountText.textContent = `ยังไม่ได้เลือกวัน`; };
        yearSelect.onchange = () => { selectedDates.clear(); renderCalendar(); selectedCountText.textContent = `ยังไม่ได้เลือกวัน`; };

        // ปุ่มเลือกวันทั้งหมด
        selectAllBtn.onclick = () => {
            const month = parseInt(monthSelect.value);
            const yearBE = parseInt(yearSelect.value);
            const yearCE = yearBE - 543;
            const daysInMonth = new Date(yearCE, month + 1, 0).getDate();

            for (let day = 1; day <= daysInMonth; day++) {
                selectedDates.add(day);
            }
            renderCalendar();
            selectedCountText.textContent = `เลือกแล้ว ${selectedDates.size} วัน`;
        };

        // สร้างตารางลงชื่อ
        applyCalendarBtn.onclick = () => {
            if (selectedDates.size === 0) return alert('กรุณาเลือกวันที่ปฏิบัติงานอย่างน้อย 1 วัน');

            const sortedDays = Array.from(selectedDates).sort((a, b) => a - b);
            updateTablePreview(sortedDays);

            tableWrapper.classList.remove('hidden');
            window.scrollTo({ top: tableWrapper.offsetTop, behavior: 'smooth' });
        };

        function updateTablePreview(sortedDays) {
            // โหลด Autocomplete จากฐานข้อมูล
            const datalist = document.getElementById('lawyerSuggestions');
            if (typeof getLawyerList === 'function') {
                datalist.innerHTML = getLawyerList().map(l => `<option value="${l.fullName}">`).join('');
            }

            const monthName = thaiMonths[parseInt(monthSelect.value)];
            const yearBE = yearSelect.value;

            let html = `<table class="w-full text-sm text-left border-collapse">`;
            html += `<thead class="text-xs text-gray-300 uppercase bg-gray-700"><tr>`;
            html += `<th class="border border-gray-600 px-4 py-2 w-16 text-center">ลำดับ</th>`;
            html += `<th class="border border-gray-600 px-4 py-2">รายชื่อทนายความอาสา</th>`;
            html += `<th class="border border-gray-600 px-4 py-2 w-48">วันปฏิบัติงาน</th>`;
            html += `</tr></thead><tbody>`;

            for (let i = 0; i < sortedDays.length; i++) {
                const day = sortedDays[i];
                const dateStr = `${day} ${monthName} ${yearBE}`;
                html += `<tr class="bg-gray-800 hover:bg-gray-750">
                    <td class="border border-gray-600 px-4 py-2 text-center text-gray-500">${i + 1}</td>
                    <td class="border border-gray-600 p-0">
                        <input type="text" list="lawyerSuggestions" 
                            class="lawyer-input w-full bg-transparent px-4 py-2 text-blue-400 outline-none focus:bg-gray-700" 
                            placeholder="ค้นหาชื่อ..." value="">
                    </td>
                    <td class="border border-gray-600 px-4 py-2 text-gray-400 date-cell">${dateStr}</td>
                </tr>`;
            }
            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
        }

        // ปุ่มล้างชื่อ
        clearAllBtn.onclick = () => {
            if (confirm('ล้างรายชื่อทนายความทั้งหมดในตาราง?')) {
                document.querySelectorAll('.lawyer-input').forEach(input => input.value = '');
            }
        };

        // ส่งออกไฟล์ข้อมูลดิบ
        exportBtn.onclick = () => {
            // สร้าง Array 2 มิติ สำหรับแปลงเป็น Excel
            let aoa = [["ลำดับ", "รายชื่อทนายความอาสา", "วันปฏิบัติงาน"]];

            const rows = document.querySelectorAll('#tableContainer tbody tr');
            rows.forEach((row, index) => {
                const lawyerName = row.querySelector('.lawyer-input').value.trim();
                const dateStr = row.querySelector('.date-cell').innerText.trim();
                aoa.push([index + 1, lawyerName, dateStr]);
            });

            // สร้าง Workbook และ Worksheet ใหม่
            const newWorkbook = XLSX.utils.book_new();
            const newWorksheet = XLSX.utils.aoa_to_sheet(aoa);

            // นำ Sheet ใส่ลงใน Workbook
            XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "รายชื่อทนาย");

            // ดาวน์โหลดไฟล์
            XLSX.writeFile(newWorkbook, `ข้อมูลทนาย_${thaiMonths[monthSelect.value]}_${yearSelect.value}.xlsx`);
        };
    </script>
</body>

</html>
